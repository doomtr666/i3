[workspace]
members = [
    "crates/i3_gfx",
    "crates/i3_vulkan_backend",
    "crates/i3_null_backend",
    "crates/i3_slang",
    "examples/draw_triangle",
    "examples/common",
    "examples/synthwave_grid",
    "examples/compute_mandelbrot",
    "tools/rust_diagnostics",
    "tools/vulkan_diagnostics", "crates/i3_baker", "crates/i3_io",
    "crates/i3_renderer",
    "examples/deferred_cubes",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["C. Delacourt"]

[workspace.lints.rust]
warnings = "deny"

[workspace.dependencies]
# External (To be justified and approved one-by-one)
bitflags = "2.6"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
thiserror = "1.0"
ash = { version = "0.38", features = ["linked"] }
sdl2 = { version = "0.37", default-features = false }
vk-mem = "0.5.0"
nalgebra = "0.33"
nalgebra-glm = "0.19"

# Internal
i3_gfx = { path = "crates/i3_gfx" }
i3_renderer = { path = "crates/i3_renderer" }
